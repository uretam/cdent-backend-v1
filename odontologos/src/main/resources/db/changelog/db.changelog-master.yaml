databaseChangeLog:
  - changeSet:
      id: 001-create-odontologos
      author: copilot
      changes:
        - createTable:
            tableName: odontologos
            columns:
              - column:
                  name: id_odontologo
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: rut
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: nombres
                  type: VARCHAR(200)
              - column:
                  name: apellidos
                  type: VARCHAR(200)
              - column:
                  name: especialidad
                  type: VARCHAR(200)
              - column:
                  name: email
                  type: VARCHAR(200)
              - column:
                  name: telefono
                  type: VARCHAR(50)
              - column:
                  name: activo
                  type: BOOLEAN

  - changeSet:
      id: 002-insert-odontologos
      author: copilot
      changes:
        - insert:
            tableName: odontologos
            columns:
