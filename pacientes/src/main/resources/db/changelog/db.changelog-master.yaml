databaseChangeLog:
  - changeSet:
      id: 001-create-pacientes
      author: copilot
      changes:
        - createTable:
            tableName: pacientes
            columns:
              - column:
                  name: id_paciente
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: rut
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: nombres
                  type: VARCHAR(200)
              - column:
                  name: apellidos
                  type: VARCHAR(200)
              - column:
                  name: fecha_nacimiento
                  type: DATE
              - column:
                  name: email
                  type: VARCHAR(200)
              - column:
                  name: telefono
                  type: VARCHAR(50)
              - column:
                  name: direccion
                  type: VARCHAR(300)
              - column:
                  name: activo
                  type: BOOLEAN

  - changeSet:
      id: 002-create-contactos-emergencia
      author: copilot
      changes:
        - createTable:
            tableName: contactos_emergencia
            columns:
              - column:
                  name: id_contacto
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: nombre_contacto
                  type: VARCHAR(200)
              - column:
                  name: telefono_contacto
                  type: VARCHAR(50)
              - column:
                  name: parentesco
                  type: VARCHAR(100)
              - column:
                  name: id_paciente
                  type: BIGINT

