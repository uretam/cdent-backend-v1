server:
  port: 9080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: pacientes-route
          uri: http://localhost:9081
          predicates:
            - Path=/api/pacientes/**
        - id: odontologos-route
          uri: http://localhost:9082
          predicates:
            - Path=/api/odontologos/**
        - id: citas-route
          uri: http://localhost:9083
          predicates:
            - Path=/api/citas/**
        - id: usuarios-route
          uri: http://localhost:9084
          predicates:
            - Path=/api/usuarios/**
        - id: tratamientos-route
          uri: http://localhost:9085
          predicates:
            - Path=/api/tratamientos/**